[package]
name = "anchor-counter"
version = "0.1.0"
description = "Minimal Anchor counter used as the rails devnet deploy fixture."
edition = "2021"
license = "MIT"

[lib]
crate-type = ["cdylib", "lib"]
name = "anchor_counter"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build"]

[dependencies]
anchor-lang = "1.0.0"
